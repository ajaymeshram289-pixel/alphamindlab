<!DOCTYPE html>
<html>
<head>
  <title>AlphaMindLab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg,#020617,#0f172a);
      color: white;
    }

    header {
      text-align: center;
      padding: 40px;
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(90deg,#22c55e,#6366f1);
    }

    nav {
      display: flex;
      justify-content: center;
      background: #020617;
    }

    nav a {
      padding: 15px 25px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      background: #22c55e;
      border-radius: 6px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 42px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #0f172a;
      padding: 20px;
      margin: 20px 0;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(34,197,94,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #6366f1;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: black;
    }
  </style>
</head>

<body>

<header>AlphaMindLab</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Philosophy</a>
  <a href="#">Science</a>
  <a href="#">Fitness</a>
</nav>

<div class="hero">
  <h1>Upgrade Your Mind & Body</h1>
  <p>Philosophy + Science + Fitness = Success</p>
</div>

<div class="container">
